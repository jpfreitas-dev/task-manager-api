services:
  database:
    image: bitnami/postgresql:latest
    container_name: task_manager_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: task_manager_db
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/bitnami/postgresql

    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d task_manager_db']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: task_manager_api
    restart: always
    ports:
      - '3000:3000'
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules # Evita que os pacotes da sua máquina local apaguem os do container
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@database:5432/task_manager_db?schema=public
    depends_on:
      database:
        condition: service_healthy # <--- A API só inicia após o healthcheck do banco passar

volumes:
  pgdata:
